const byCategory = {};
ARTICLES.forEach(a => {
  if (!byCategory[a.category]) byCategory[a.category] = [];
  byCategory[a.category].push(a);
});

const state = {
  statuses: Object.fromEntries(ARTICLES.map(a => [a.slug, 'pending'])),
  contents: {},
  running: false,
  paused: false,
  startTime: null,
  doneTimes: []
};

// Build grid
const grid = document.getElementById('grid');
ARTICLES.forEach(a => {
  const chip = document.createElement('div');
  chip.className = 'article-chip';
  chip.id = 'chip-' + a.slug;
  chip.innerHTML = `<span class="chip-icon">${a.icon}</span><span class="chip-slug" title="${a.slug}">${a.slug}</span><span class="chip-status status-pending" id="status-${a.slug}">○</span>`;
  grid.appendChild(chip);
});

function log(msg, type='info') {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  const done = Object.values(state.statuses).filter(s => s === 'done').length;
  const running = Object.values(state.statuses).filter(s => s === 'running').length;
  const errors = Object.values(state.statuses).filter(s => s === 'error').length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('runningCount').textContent = running;
  document.getElementById('errorCount').textContent = errors;
  document.getElementById('progressBar').style.width = (done / ARTICLES.length * 100) + '%';
  
  if (done > 0 && state.startTime) {
    const elapsed = (Date.now() - state.startTime) / 1000;
    const perArticle = elapsed / done;
    const remaining = (ARTICLES.length - done) * perArticle;
    const mins = Math.floor(remaining / 60);
    const secs = Math.floor(remaining % 60);
    document.getElementById('etaText').textContent = done >= ARTICLES.length ? 'Done!' : `~${mins}m ${secs}s`;
  }
}

function setChipStatus(slug, status) {
  state.statuses[slug] = status;
  const el = document.getElementById('status-' + slug);
  if (!el) return;
  const map = { pending: ['○', 'status-pending'], running: ['◉', 'status-running'], done: ['✓', 'status-done'], error: ['✗', 'status-error'] };
  el.className = 'chip-status ' + map[status][1];
  el.textContent = map[status][0];
  updateStats();
}

function buildPrompt(article) {
  const sameCat = byCategory[article.category]
    .filter(a => a.slug !== article.slug)
    .slice(0, 4)
    .map(a => `[${a.title}](/article/${a.slug})`)
    .join(', ');

  const crossCat = ARTICLES
    .filter(a => a.category !== article.category)
    .slice(0, 3)
    .map(a => `[${a.title}](/article/${a.slug})`)
    .join(', ');

  return `You are a senior UK personal finance writer for moneystackguide.com — a YMYL site. Write a COMPLETE, UNIQUE, expert-level article.

Title: ${article.title}
Category: ${article.categoryName}
Meta description: ${article.metaDescription}

MANDATORY REQUIREMENTS:
1. Minimum 1,800 words of substantive, genuinely useful content
2. British English throughout (£, colour, whilst, prioritise, etc.)
3. Unique angle with specific UK data: real rates, thresholds, FCA rules, HMRC limits, gov schemes by exact name
4. Minimum 7 ## sections, each with 3+ paragraphs
5. At least one markdown comparison table
6. At least one numbered practical checklist
7. A "Quick Summary" box near the top (use > blockquote format)
8. A "Common Mistakes to Avoid" section
9. A "FAQs" section at the bottom (4 questions, detailed answers)
10. Naturally embed these internal links in body text:
    Same category: ${sameCat}
    Cross-category: ${crossCat}
11. End with a financial disclaimer paragraph
12. DO NOT include the H1 title — start directly with ## first section
13. Every section substantive — no padding or fluff

Return ONLY the markdown content. No preamble, no explanation.`;
}

async function rewriteOne(article) {
  setChipStatus(article.slug, 'running');
  log(`→ Starting: ${article.slug}`, 'info');
  
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: buildPrompt(article) }]
      })
    });
    
    const data = await response.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    
    const content = data.content[0].text;
    state.contents[article.slug] = content;
    setChipStatus(article.slug, 'done');
    log(`✓ Done: ${article.slug} (${content.length.toLocaleString()} chars)`, 'ok');
    return true;
  } catch (err) {
    setChipStatus(article.slug, 'error');
    log(`✗ Error: ${article.slug} — ${err.message}`, 'err');
    return false;
  }
}

function generateArticlesTS() {
  const lines = [];
  lines.push(`import type { Article, Category } from './types'`);
  lines.push('');
  lines.push('export const categories: Category[] = [');
  lines.push(`  { slug: 'credit-cards', name: 'Credit Cards', icon: '💳', count: ${ARTICLES.filter(a=>a.category==='credit-cards').length} },`);
  lines.push(`  { slug: 'student-loans', name: 'Student Loans', icon: '🎓', count: ${ARTICLES.filter(a=>a.category==='student-loans').length} },`);
  lines.push(`  { slug: 'investing', name: 'Investing', icon: '📈', count: ${ARTICLES.filter(a=>a.category==='investing').length} },`);
  lines.push(`  { slug: 'mortgages', name: 'Mortgages', icon: '🏠', count: ${ARTICLES.filter(a=>a.category==='mortgages').length} },`);
  lines.push(`  { slug: 'budgeting', name: 'Budgeting', icon: '💰', count: ${ARTICLES.filter(a=>a.category==='budgeting').length} },`);
  lines.push(`  { slug: 'savings', name: 'Savings', icon: '🏦', count: ${ARTICLES.filter(a=>a.category==='savings').length} },`);
  lines.push('];');
  lines.push('');
  lines.push('export const articles: Article[] = [');
  
  for (const a of ARTICLES) {
    const content = state.contents[a.slug] || '<!-- content not generated -->';
    const escaped = content.replace(/`/g, '\\`').replace(/\${/g, '\\${');
    lines.push('  {');
    lines.push(`    slug: '${a.slug}',`);
    lines.push(`    title: '${a.title.replace(/'/g, "\\'")}',`);
    lines.push(`    excerpt: '${a.excerpt.replace(/'/g, "\\'")}',`);
    lines.push(`    category: '${a.category}',`);
    lines.push(`    categoryName: '${a.categoryName}',`);
    lines.push(`    readTime: '${a.readTime}',`);
    lines.push(`    date: '${a.date}',`);
    if (a.featured) lines.push(`    featured: true,`);
    lines.push(`    icon: '${a.icon}',`);
    lines.push(`    gradient: '${a.gradient}',`);
    lines.push(`    metaDescription: '${a.metaDescription.replace(/'/g, "\\'")}',`);
    lines.push(`    content: \`${escaped}\`,`);
    lines.push('  },');
    lines.push('');
  }
  
  lines.push('];');
  lines.push('');
  lines.push('export function getArticleBySlug(slug: string) {');
  lines.push('  return articles.find(a => a.slug === slug) ?? null;');
  lines.push('}');
  lines.push('');
  lines.push('export function getArticlesByCategory(category: string) {');
  lines.push('  return articles.filter(a => a.category === category);');
  lines.push('}');
  lines.push('');
  lines.push('export function getRecentArticles(count = 6) {');
  lines.push('  return articles.slice(0, count);');
  lines.push('}');
  
  return lines.join('\n');
}

function downloadFile() {
  const ts = generateArticlesTS();
  const blob = new Blob([ts], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'articles.ts';
  a.click();
  URL.revokeObjectURL(url);
  log('📥 articles.ts downloaded!', 'ok');
}

let paused = false;
function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause';
  if (!paused) log('▶ Resumed', 'warn');
  else log('⏸ Paused — will finish current article', 'warn');
}

async function startRewrite() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('pauseBtn').style.display = 'inline-block';
  state.startTime = Date.now();
  
  const pending = ARTICLES.filter(a => state.statuses[a.slug] === 'pending');
  log(`Starting rewrite of ${pending.length} articles...`, 'warn');
  
  for (let i = 0; i < pending.length; i++) {
    while (paused) await new Promise(r => setTimeout(r, 500));
    await rewriteOne(pending[i]);
    await new Promise(r => setTimeout(r, 300));
    
    const done = Object.values(state.statuses).filter(s => s === 'done').length;
    if (done === ARTICLES.length) break;
  }
  
  const done = Object.values(state.statuses).filter(s => s === 'done').length;
  const errors = Object.values(state.statuses).filter(s => s === 'error').length;
  log(`🎉 Complete! ${done} done, ${errors} errors`, 'ok');
  document.getElementById('downloadBtn').disabled = false;
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('etaText').textContent = 'Done!';
}
</script>
